  "APRIN XL 350 ES":"#558B2F",
  "PORKAN / PLOCAFİR":"#827717","PORKAN / PLOCAFIR":"#827717",
  "QUADRIS MAXX":"#6A1B9A","QUADRİS MAXX":"#6A1B9A",
  "SWITCH 62.5 WG":"#E65100",
  "FORTENZA 600 FS":"#AD1457",
  "CELEST MAX 100 FS":"#00695C",
  "AMISTAR GOLD":"#33691E",
  "AGRIMEC EC":"#4E342E",
};

// data.js'den gelen BKU_DATA'yı kullan
const data = (typeof BKU_DATA !== 'undefined') ? BKU_DATA : [];

// Crop bazlı gruplama
const cropsByBitki = {};
data.forEach(d => {
  const bitki = d.bitki || "";
  if (!cropsByBitki[bitki]) cropsByBitki[bitki] = [];
  cropsByBitki[bitki].push(d);
});
const allCrops = Object.keys(cropsByBitki).sort((a,b) => a.localeCompare(b,'tr'));

function App() {
  const [search, setSearch] = useState("");
  const [closedCrops, setClosedCrops] = useState({});
  const toggleCrop = (crop) => setClosedCrops(prev => ({...prev, [crop]: !prev[crop]}));

  const filteredCrops = allCrops.filter(c => {
    if (!search) return true;
    const s = search.toLowerCase();
    const items = cropsByBitki[c];
    return c.toLowerCase().includes(s) || items.some(i =>
      (i.zararli||"").toLowerCase().includes(s) ||
      (i.urun||"").toLowerCase().includes(s)
    );
  });

  // Son güncelleme bilgisi
  const updateInfo = (typeof BKU_DATA !== 'undefined' && BKU_DATA.length > 0)
    ? `${BKU_DATA.length} geçici tavsiye | ${allCrops.length} kültür bitkisi | ${[...new Set(data.map(d=>d.urun))].length} Syngenta ürünü`
    : "Veri yüklenemedi";

  return (
    <div style={{fontFamily:"Arial, sans-serif", background:"#f5f7f2", minHeight:"100vh", color:"#222"}}>

      {/* HEADER */}
      <div style={{background:"#fff", borderBottom:"3px solid #019934", padding:"16px 24px"}}>
        <div style={{maxWidth:900, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12}}>
          <img src={LOGO} alt="Syngenta" style={{height:36}} />
          <span style={{fontSize:12, color:"#666"}}>syngenta.com.tr</span>
        </div>
      </div>

      {/* HERO */}
      <div style={{background:"linear-gradient(135deg, #01662e 0%, #019934 60%, #2fb95a 100%)", color:"#fff", padding:"40px 24px 36px"}}>
        <div style={{maxWidth:900, margin:"0 auto"}}>
          <p style={{fontSize:13, letterSpacing:1.5, textTransform:"uppercase", margin:"0 0 8px", opacity:0.8}}>Bitki Koruma Ürünleri</p>
          <h1 style={{fontSize:"clamp(24px, 4.5vw, 38px)", margin:"0 0 12px", fontWeight:700, lineHeight:1.2}}>
            2026 Geçici Tavsiye Alan Ürünlerimiz
          </h1>
          <p style={{fontSize:15, opacity:0.9, maxWidth:640, lineHeight:1.6, margin:"0 0 16px"}}>
            T.C. Tarım ve Orman Bakanlığı BKU Veri Tabanı'nda 2026 yılı için geçici tavsiye almış Syngenta ürünleri. Kültür bitkisine göre arama yaparak size uygun çözümü bulabilirsiniz.
          </p>
          <div style={{fontSize:13, opacity:0.75, background:"rgba(255,255,255,0.15)", display:"inline-block", padding:"6px 14px", borderRadius:6}}>
            {updateInfo}
          </div>
        </div>
      </div>

      {/* DISCLAIMER */}
      <div style={{background:"#FFF8E1", borderBottom:"1px solid #FFD54F", padding:"10px 24px"}}>
        <div style={{maxWidth:900, margin:"0 auto", fontSize:12, color:"#5D4037"}}>
          ⚠️ Geçici tavsiyeler belirli süreler ve koşullar dahilinde geçerlidir. Uygulama öncesi güncel durumu <a href="https://bku.tarimorman.gov.tr/BKUGeciciTavsiyeAlanlar/GeciciTavsiyeIndeks" style={{color:"#E65100", fontWeight:600}}>BKU Veri Tabanı</a>'ndan doğrulayınız.
        </div>
      </div>

      {/* MAIN */}
      <div style={{maxWidth:900, margin:"0 auto", padding:"28px 24px"}}>

        {data.length === 0 && (
          <div style={{textAlign:"center", padding:60, color:"#999"}}>
            <div style={{fontSize:48, marginBottom:16}}>⏳</div>
            <p style={{fontSize:16}}>Veri yükleniyor veya henüz data.js dosyası oluşturulmamış.</p>
            <p style={{fontSize:13, marginTop:8}}>GitHub Actions workflow'u çalıştırarak veriyi güncelleyebilirsiniz.</p>
          </div>
        )}

        {data.length > 0 && (<>
          {/* SEARCH */}
          <div style={{marginBottom:24}}>
            <input
              type="text" placeholder="Kültür bitkisi, zararlı veya ürün adı yazın..."
              value={search} onChange={e => setSearch(e.target.value)}
              style={{width:"100%", padding:"12px 16px", borderRadius:6, border:"1.5px solid #C8E6C9", fontSize:14, fontFamily:"Arial", boxSizing:"border-box", outline:"none", background:"#fff"}}
            />
          </div>

          {/* CROP CARDS */}
          <div style={{display:"flex", flexDirection:"column", gap:2}}>
            {filteredCrops.map(crop => {
              const items = cropsByBitki[crop].filter(i => {
                if (!search) return true;
                const s = search.toLowerCase();
                return crop.toLowerCase().includes(s) || (i.zararli||"").toLowerCase().includes(s) || (i.urun||"").toLowerCase().includes(s);
              });
              const isOpen = !closedCrops[crop];
              return (
                <div key={crop}>
                  <button
                    onClick={() => toggleCrop(crop)}
                    style={{
                      width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between",
                      padding:"14px 18px", background: isOpen ? "#019934" : "#fff",
                      color: isOpen ? "#fff" : "#222", border:"1px solid #e0e0e0",
                      borderRadius: isOpen ? "6px 6px 0 0" : 6, cursor:"pointer",
                      fontFamily:"Arial", fontSize:15, fontWeight:600, textAlign:"left",
                      transition:"all 0.15s"
                    }}>
                    <span style={{display:"flex", alignItems:"center", gap:10}}>
                      <span style={{fontSize:18}}>🌱</span>
                      {crop}
                      <span style={{
                        fontSize:11, fontWeight:400, padding:"2px 8px", borderRadius:10,
                        background: isOpen ? "rgba(255,255,255,0.25)" : "#E8F5E9",
                        color: isOpen ? "#fff" : "#2E7D32"
                      }}>
                        {items.length} tavsiye
                      </span>
                    </span>
                    <span style={{fontSize:12, transition:"transform 0.2s", transform: isOpen ? "rotate(180deg)" : "none"}}>▼</span>
                  </button>

                  {isOpen && (
                    <div style={{border:"1px solid #e0e0e0", borderTop:"none", borderRadius:"0 0 6px 6px", background:"#fff", overflow:"hidden"}}>
                      {items.map((item, idx) => (
                        <div key={idx} style={{
                          padding:"16px 18px", borderBottom: idx < items.length - 1 ? "1px solid #f0f0f0" : "none",
                          display:"grid", gridTemplateColumns:"1fr", gap:10
                        }}>
                          <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:8}}>
                            <div>
                              <div style={{fontSize:11, color:"#888", textTransform:"uppercase", letterSpacing:0.5, marginBottom:2}}>{item.grup || "Bitki Koruma"}</div>
                              <div style={{fontSize:15, fontWeight:600, color:"#333"}}>{item.zararli || "-"}</div>
                            </div>
                            <div style={{
                              background: urunRenk[item.urun] || "#333", color:"#fff",
                              padding:"5px 12px", borderRadius:4, fontSize:13, fontWeight:700, whiteSpace:"nowrap"
                            }}>
                              {item.urun || "-"}
                            </div>
                          </div>

                          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(130px, 1fr))", gap:8}}>
                            <div style={{background:"#f8f9f6", padding:"8px 10px", borderRadius:4}}>
                              <div style={{fontSize:10, color:"#888", textTransform:"uppercase"}}>Formülasyon</div>
                              <div style={{fontSize:13, fontWeight:600}}>{item.form || "-"}</div>
                            </div>
                            <div style={{background:"#f8f9f6", padding:"8px 10px", borderRadius:4}}>
                              <div style={{fontSize:10, color:"#888", textTransform:"uppercase"}}>Aktif Madde</div>
                              <div style={{fontSize:12, fontWeight:500}}>{item.aktif || "-"}</div>
                            </div>
                            <div style={{background:"#f8f9f6", padding:"8px 10px", borderRadius:4}}>
                              <div style={{fontSize:10, color:"#888", textTransform:"uppercase"}}>Doz</div>
                              <div style={{fontSize:13, fontWeight:600, color:"#019934"}}>{item.doz || "-"}</div>
                            </div>
                            <div style={{background:"#f8f9f6", padding:"8px 10px", borderRadius:4}}>
                              <div style={{fontSize:10, color:"#888", textTransform:"uppercase"}}>PHI</div>
                              <div style={{fontSize:13, fontWeight:700, color: (item.phi||"").includes("Tohum") ? "#E65100" : item.phi === "-" ? "#999" : "#1565C0"}}>{item.phi || "-"}</div>
                            </div>
                            <div style={{background:"#f8f9f6", padding:"8px 10px", borderRadius:4}}>
                              <div style={{fontSize:10, color:"#888", textTransform:"uppercase"}}>Geçerlilik</div>
                              <div style={{fontSize:13, fontWeight:500}}>{item.gecerlilik || "-"}</div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {filteredCrops.length === 0 && (
            <div style={{textAlign:"center", padding:40, color:"#999"}}>
              Aramanızla eşleşen kültür bitkisi bulunamadı.
            </div>
          )}
        </>)}
      </div>

      {/* FOOTER */}
      <div style={{borderTop:"3px solid #019934", background:"#fff", padding:"24px", marginTop:40}}>
        <div style={{maxWidth:900, margin:"0 auto", textAlign:"center"}}>
          <img src={LOGO} alt="Syngenta" style={{height:28, marginBottom:12}} />
          <p style={{fontSize:12, color:"#888", margin:"0 0 6px"}}>
            Bu sayfa yalnızca bilgilendirme amaçlıdır. Resmi ve güncel bilgiler için{" "}
            <a href="https://bku.tarimorman.gov.tr/BKUGeciciTavsiyeAlanlar/GeciciTavsiyeIndeks" style={{color:"#019934"}}>BKU Veri Tabanı</a>'nı ziyaret ediniz.
          </p>
          <p style={{fontSize:11, color:"#aaa", margin:0}}>© 2026 Syngenta Tarım Sanayi ve Ticaret A.Ş.</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
