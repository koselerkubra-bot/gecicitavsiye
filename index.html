  "AMPLİGO 150 ZC":"#C62828","AMPLIGO 150 ZC":"#C62828",
  "APRIN XL 350 ES":"#558B2F",
  "PORKAN / PLOCAFİR":"#827717","PORKAN / PLOCAFIR":"#827717",
  "QUADRIS MAXX":"#6A1B9A","QUADRİS MAXX":"#6A1B9A",
  "SWITCH 62.5 WG":"#E65100",
  "FORTENZA 600 FS":"#AD1457",
  "CELEST MAX 100 FS":"#00695C",
  "AMISTAR GOLD":"#33691E",
  "AGRIMEC EC":"#4E342E",
};

function isValid(gecerlilik) {
  if (!gecerlilik) return true;
  const parts = gecerlilik.split("-");
  if (parts.length === 3) {
    const d = new Date(parts[0], parts[1]-1, parts[2]);
    return d >= new Date(new Date().toDateString());
  }
  return true;
}

const rawData = (typeof BKU_DATA !== 'undefined') ? BKU_DATA : [];
const data = rawData.filter(d => isValid(d.gecerlilik));

// ============================================================
// TAB 1: LİSTE (BKU formatı — Excel'deki tüm kolonlar)
// ============================================================
function ListView({ search }) {
  const [sortCol, setSortCol] = useState("bitki");
  const [sortDir, setSortDir] = useState("asc");

  const filtered = data.filter(d => {
    if (!search) return true;
    const s = search.toLowerCase();
    return Object.values(d).some(v => (v||"").toString().toLowerCase().includes(s));
  });

  const sorted = [...filtered].sort((a,b) => {
    const va = (a[sortCol]||"").toString().toLowerCase();
    const vb = (b[sortCol]||"").toString().toLowerCase();
    return sortDir === "asc" ? va.localeCompare(vb,'tr') : vb.localeCompare(va,'tr');
  });

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d==="asc"?"desc":"asc");
    else { setSortCol(col); setSortDir("asc"); }
  };

  const cols = [
    {key:"urun", label:"Ürün", w:140},
    {key:"form", label:"Form.", w:50},
    {key:"aktif", label:"Aktif Madde", w:220},
    {key:"bitki", label:"Bitki", w:120},
    {key:"zararli", label:"Zararlı / Hastalık", w:220},
    {key:"phi", label:"Son İlaçlama ile Hasat Arası Süre", w:100},
    {key:"doz", label:"Doz", w:140},
    {key:"mrl", label:"MRL", w:120},
    {key:"grup", label:"Ruhsat Grubu", w:90},
    {key:"gecerlilik", label:"Geçerlilik", w:90},
    {key:"aciklama", label:"Açıklama", w:200},
  ];

  return (
    <div>
      <div style={{fontSize:13, color:"#666", marginBottom:10}}>
        {sorted.length} kayıt gösteriliyor {search && `("${search}" filtresi)`}
      </div>
      <div style={{overflowX:"auto", borderRadius:6, border:"1px solid #ddd"}}>
        <table style={{width:"100%", fontSize:12, whiteSpace:"nowrap"}}>
          <thead>
            <tr>
              {cols.map(c => (
                <th key={c.key} onClick={() => handleSort(c.key)}
                  style={{
                    padding:"10px 8px", textAlign:"left", fontWeight:700, fontSize:11,
                    background:"#1a3a0a", color:"#fff", cursor:"pointer", userSelect:"none",
                    borderBottom:"2px solid #019934", minWidth:c.w
                  }}>
                  {c.label}
                  {sortCol===c.key && <span style={{marginLeft:4}}>{sortDir==="asc"?"▲":"▼"}</span>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.map((d, i) => (
              <tr key={i}
                style={{background: i%2===0 ? "#fff" : "#f8faf6", borderBottom:"1px solid #eee"}}
                onMouseEnter={e => e.currentTarget.style.background="#EDF7ED"}
                onMouseLeave={e => e.currentTarget.style.background=i%2===0?"#fff":"#f8faf6"}>
                <td style={{padding:"8px", fontWeight:600}}>
                  <span style={{
                    background:urunRenk[d.urun]||"#555", color:"#fff",
                    padding:"2px 8px", borderRadius:3, fontSize:11, fontWeight:700, display:"inline-block"
                  }}>{d.urun}</span>
                </td>
                <td style={{padding:"8px", fontWeight:600, color:"#333"}}>{d.form||"-"}</td>
                <td style={{padding:"8px", fontSize:11, color:"#444"}}>{d.aktif||"-"}</td>
                <td style={{padding:"8px", fontWeight:600}}>{d.bitki||"-"}</td>
                <td style={{padding:"8px", whiteSpace:"normal", minWidth:200}}>{d.zararli||"-"}</td>
                <td style={{padding:"8px", fontWeight:700, color:(d.phi||"").includes("Tohum")?"#E65100":d.phi==="-"?"#aaa":"#1565C0"}}>{d.phi||"-"}</td>
                <td style={{padding:"8px", color:"#019934", fontWeight:500}}>{d.doz||"-"}</td>
                <td style={{padding:"8px", fontSize:11}}>{d.mrl||"-"}</td>
                <td style={{padding:"8px", fontSize:11, color:"#666"}}>{d.grup||"-"}</td>
                <td style={{padding:"8px", fontSize:11}}>{d.gecerlilik||"-"}</td>
                <td style={{padding:"8px", fontSize:11, color:"#666", whiteSpace:"normal", minWidth:160}}>{(d.aciklama && d.aciklama!=="-") ? d.aciklama : ""}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {sorted.length === 0 && (
        <div style={{textAlign:"center", padding:40, color:"#999"}}>Aramanızla eşleşen kayıt bulunamadı.</div>
      )}
    </div>
  );
}

// ============================================================
// TAB 2: CROP GÖRÜNÜMÜ
// ============================================================
function CropView({ search }) {
  const [selectedCrop, setSelectedCrop] = useState(null);

  const crops = useMemo(() => {
    const map = {};
    data.forEach(d => {
      const b = d.bitki || "DİĞER";
      if (!map[b]) map[b] = [];
      map[b].push(d);
    });
    return map;
  }, []);

  const allCropNames = Object.keys(crops).sort((a,b) => a.localeCompare(b,'tr'));

  const filteredCropNames = allCropNames.filter(c => {
    if (!search) return true;
    const s = search.toLowerCase();
    return c.toLowerCase().includes(s) || crops[c].some(d =>
      (d.zararli||"").toLowerCase().includes(s) || (d.urun||"").toLowerCase().includes(s)
    );
  });

  const activeCrop = selectedCrop && crops[selectedCrop] ? selectedCrop : null;

  return (
    <div>
      <div style={{fontSize:13, color:"#666", marginBottom:12}}>
        {filteredCropNames.length} kültür bitkisi {search && `("${search}" filtresi)`}
      </div>
      <div style={{display:"flex", flexWrap:"wrap", gap:8, marginBottom:20}}>
        {filteredCropNames.map(c => {
          const sel = activeCrop === c;
          return (
            <button key={c} onClick={() => setSelectedCrop(sel ? null : c)}
              style={{
                padding:"7px 14px", borderRadius:20, fontSize:13, fontWeight:600,
                border: sel ? "2px solid #019934" : "1.5px solid #ccc",
                background: sel ? "#019934" : "#fff",
                color: sel ? "#fff" : "#333",
                cursor:"pointer", transition:"all 0.15s",
                display:"flex", alignItems:"center", gap:5
              }}>
              🌱 {c}
              <span style={{
                fontSize:10, fontWeight:400, padding:"1px 6px", borderRadius:10,
                background: sel ? "rgba(255,255,255,0.3)" : "#E8F5E9",
                color: sel ? "#fff" : "#2E7D32"
              }}>{crops[c].length}</span>
            </button>
          );
        })}
      </div>

      {!activeCrop && filteredCropNames.length > 0 && (
        <div style={{textAlign:"center", padding:24, color:"#999", fontSize:14}}>
          ☝️ Yukarıdan bir kültür bitkisi seçin
        </div>
      )}

      {activeCrop && (
        <div style={{border:"2px solid #019934", borderRadius:8, overflow:"hidden"}}>
          <div style={{background:"#019934", color:"#fff", padding:"12px 18px", fontSize:16, fontWeight:700, display:"flex", alignItems:"center", gap:8}}>
            🌱 {activeCrop}
            <span style={{fontSize:12, fontWeight:400, opacity:0.8}}>— {crops[activeCrop].length} geçici tavsiye</span>
          </div>

          {/* Crop içi tablo */}
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%", fontSize:12}}>
              <thead>
                <tr style={{background:"#E8F5E9"}}>
                  {["Zararlı / Hastalık","Ürün","Form.","Aktif Madde","Son İlaçlama ile Hasat Arası Süre","Doz","MRL","Geçerlilik","Açıklama"].map(h => (
                    <th key={h} style={{padding:"10px 8px", textAlign:"left", fontWeight:700, fontSize:11, color:"#1a3a0a", borderBottom:"2px solid #A5D6A7", whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {crops[activeCrop].map((d, i) => (
                  <tr key={i} style={{background: i%2===0 ? "#fff" : "#fafdf7", borderBottom:"1px solid #eee"}}>
                    <td style={{padding:"9px 8px", fontWeight:600, whiteSpace:"normal", minWidth:200}}>{d.zararli||"-"}</td>
                    <td style={{padding:"9px 8px"}}>
                      <span style={{background:urunRenk[d.urun]||"#555", color:"#fff", padding:"2px 8px", borderRadius:3, fontSize:11, fontWeight:700, display:"inline-block", whiteSpace:"nowrap"}}>{d.urun}</span>
                    </td>
                    <td style={{padding:"9px 8px", fontWeight:600}}>{d.form||"-"}</td>
                    <td style={{padding:"9px 8px", fontSize:11}}>{d.aktif||"-"}</td>
                    <td style={{padding:"9px 8px", fontWeight:700, color:(d.phi||"").includes("Tohum")?"#E65100":d.phi==="-"?"#aaa":"#1565C0"}}>{d.phi||"-"}</td>
                    <td style={{padding:"9px 8px", color:"#019934", fontWeight:500}}>{d.doz||"-"}</td>
                    <td style={{padding:"9px 8px", fontSize:11}}>{d.mrl||"-"}</td>
                    <td style={{padding:"9px 8px", fontSize:11, whiteSpace:"nowrap"}}>{d.gecerlilik||"-"}</td>
                    <td style={{padding:"9px 8px", fontSize:11, color:"#666", whiteSpace:"normal", minWidth:140}}>{(d.aciklama && d.aciklama!=="-") ? d.aciklama : ""}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {filteredCropNames.length === 0 && (
        <div style={{textAlign:"center", padding:40, color:"#999"}}>Aramanızla eşleşen kültür bitkisi bulunamadı.</div>
      )}
    </div>
  );
}

// ============================================================
// ANA UYGULAMA

      <div style={{background:"#FFF8E1", borderBottom:"1px solid #FFD54F", padding:"8px 24px"}}>

          ⚠️ Geçici tavsiyeler belirli süreler dahilinde geçerlidir. Güncel durum için{" "}
          <a href="https://bku.tarimorman.gov.tr/BKUGeciciTavsiyeAlanlar/GeciciTavsiyeIndeks" style={{color:"#E65100", fontWeight:600}}>BKU Veri Tabanı</a>'nı ziyaret ediniz.
        </div>
      </div>

      {/* MAIN */}
      <div style={{maxWidth:1200, margin:"0 auto", padding:"20px 24px"}}>

        {data.length === 0 ? (
          <div style={{textAlign:"center", padding:60, color:"#999"}}>
            <div style={{fontSize:48, marginBottom:16}}>⏳</div>
            <p>Veri yükleniyor veya henüz data.js dosyası oluşturulmamış.</p>
          </div>
        ) : (<>

          {/* TABS + SEARCH */}
          <div style={{display:"flex", flexWrap:"wrap", gap:12, alignItems:"center", marginBottom:18}}>
            <div style={{display:"flex", background:"#e8e8e8", borderRadius:6, overflow:"hidden"}}>
              {[{id:"liste", label:"📋 Liste"},{id:"crop", label:"🌱 Kültür Bitkisine Göre"}].map(t => (
                <button key={t.id} onClick={() => { setTab(t.id); setSearch(""); }}
                  style={{
                    padding:"9px 18px", fontSize:13, fontWeight:600, border:"none", cursor:"pointer",
                    background: tab===t.id ? "#019934" : "transparent",
                    color: tab===t.id ? "#fff" : "#555",
                    transition:"all 0.15s"

              ))}

            <input

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
