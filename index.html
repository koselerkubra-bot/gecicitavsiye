function trNorm(s) {
  return (s||"").replace(/İ/g,"I").replace(/ı/g,"i").replace(/Ğ/g,"G")
    .replace(/ğ/g,"g").replace(/Ü/g,"U").replace(/ü/g,"u")
    .replace(/Ş/g,"S").replace(/ş/g,"s").replace(/Ç/g,"C")
    .replace(/ç/g,"c").replace(/Ö/g,"O").replace(/ö/g,"o").toUpperCase();
}

const COLORS = {
  FUNGISIT:   {bg:"#2E7D32",text:"#fff",label:"Fungisit",light:"#E8F5E9"},
  INSEKTISIT: {bg:"#010066",text:"#fff",label:"İnsektisit",light:"#E8EAF6"},
  HERBISIT:   {bg:"#F9A825",text:"#333",label:"Herbisit",light:"#FFF8E1"},
  BGD:        {bg:"#00838F",text:"#fff",label:"Bitki Gelişim Düzenleyici",light:"#E0F7FA"},
  NEMATISIT:  {bg:"#AD1457",text:"#fff",label:"Nematisit",light:"#FCE4EC"},
  AKARISIT:   {bg:"#6A1B9A",text:"#fff",label:"Akarisit",light:"#F3E5F5"},
  DIGER:      {bg:"#78909C",text:"#fff",label:"Diğer",light:"#ECEFF1"},
};

function getGrupColor(grup) {
  const n = trNorm(grup);
  if (n.includes("FUNGIS")) return COLORS.FUNGISIT;
  if (n.includes("INSEKTI") || n.includes("NSEKTI")) return COLORS.INSEKTISIT;
  if (n.includes("HERBIS")) return COLORS.HERBISIT;
  if (n.includes("NEMATI") || n.includes("NEMATO")) return COLORS.NEMATISIT;
  if (n.includes("BGD") || n.includes("BITKI GEL") || n.includes("DUZENLEYICI")) return COLORS.BGD;
  if (n.includes("AKARIS")) return COLORS.AKARISIT;
  return COLORS.DIGER;
}

const urunGrup = {
  "QUADRIS":"Fungisit","QUADRİS":"Fungisit",
  "QUADRIS MAXX":"Fungisit","QUADRİS MAXX":"Fungisit",
  "AMISTAR GOLD":"Fungisit","AMİSTAR GOLD":"Fungisit",
  "APRIN XL 350 ES":"Fungisit",
  "CELEST MAX 100 FS":"Fungisit",
  "SWITCH 62.5 WG":"Fungisit",
  "KARATE ZEON":"İnsektisit",
  "NİNJA 5 EC":"İnsektisit","NINJA 5 EC":"İnsektisit",
  "AMPLİGO 150 ZC":"İnsektisit","AMPLIGO 150 ZC":"İnsektisit",
  "FORTENZA 600 FS":"İnsektisit",
  "PORKAN / PLOCAFİR":"İnsektisit","PORKAN / PLOCAFIR":"İnsektisit",
  "PLOCAFİR":"İnsektisit","PLOCAFIR":"İnsektisit","PORKAN":"İnsektisit",
  "AGRIMEC EC":"İnsektisit",
  "NEMATHORIN 10 G":"Nematisit","NEMATHORIN 150 EC":"Nematisit",
  "BERELEX % 40 WSG":"BGD","CULTAR 25 SC":"BGD","PALISADE 250 EC":"BGD",
};

function resolveGrup(urun, bkuGrup) {
  return urunGrup[urun] || bkuGrup || "Diğer";
}
function getUrunColor(urun, grup) {
  return getGrupColor(resolveGrup(urun, grup));
}

function isValid(g) {
  if (!g) return true;
  const p = g.split("-");
  if (p.length===3) return new Date(p[0],p[1]-1,p[2]) >= new Date(new Date().toDateString());
  return true;
}

const rawData = (typeof BKU_DATA !== 'undefined') ? BKU_DATA : [];
const data = rawData.filter(d => isValid(d.gecerlilik));

// ============================================================
// LEJANT
// ============================================================
function Legend() {
  const groups = {};
  data.forEach(d => {
    const g = resolveGrup(d.urun, d.grup);
    const c = getGrupColor(g);
    const k = c.label || g;
    if (!groups[k]) groups[k] = {c, count:0};
    groups[k].count++;
  });
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:14,marginBottom:14}}>
      {Object.entries(groups).sort((a,b)=>b[1].count-a[1].count).map(([g,info])=>(
        <div key={g} style={{display:"flex",alignItems:"center",gap:6,fontSize:13}}>
          <span style={{width:12,height:12,borderRadius:3,background:info.c.bg,display:"inline-block",border:info.c.bg==="#F9A825"?"1px solid #ddd":"none"}} />
          <span style={{color:"#555",fontWeight:500}}>{g}</span>
          <span style={{color:"#aaa",fontSize:11}}>({info.count})</span>
        </div>
      ))}
    </div>
  );
}

// ============================================================
// BADGE
// ============================================================
function UrunBadge({urun, grup}) {
  const c = getUrunColor(urun, grup);
  return <span style={{background:c.bg,color:c.text,padding:"3px 10px",borderRadius:4,fontSize:12,fontWeight:700,whiteSpace:"nowrap",display:"inline-block",letterSpacing:0.3}}>{urun}</span>;
}
function GrupBadge({urun, grup}) {
  const g = resolveGrup(urun, grup);
  const c = getGrupColor(g);
  return <span style={{background:c.light,color:c.bg,padding:"2px 10px",borderRadius:12,fontSize:11,fontWeight:600,whiteSpace:"nowrap",display:"inline-block",border:`1px solid ${c.bg}22`}}>{c.label}</span>;
}
function ZararliName({d}) {
  const lat = d.zararliLat;
  const hasLat = lat && lat !== "-" && lat !== "" && lat !== "None" && lat !== "--";
  return (
    <span>
      {d.zararli||"-"}
      {hasLat && <span style={{fontStyle:"italic",color:"#777",fontWeight:400}}> ({lat})</span>}
    </span>
  );
}

function ListView({ search }) {
  const [sortCol, setSortCol] = useState("bitki");
  const [sortDir, setSortDir] = useState("asc");

  const filtered = data.filter(d => {
    if (!search) return true;
    const s = search.toLowerCase();
    return Object.values(d).some(v=>(v||"").toString().toLowerCase().includes(s));
  });
  const sorted = [...filtered].sort((a,b) => {
    const va=(a[sortCol]||"").toString(), vb=(b[sortCol]||"").toString();
    return sortDir==="asc"?va.localeCompare(vb,'tr'):vb.localeCompare(va,'tr');
  });
  const handleSort = (col) => {
    if(sortCol===col) setSortDir(d=>d==="asc"?"desc":"asc");
    else {setSortCol(col);setSortDir("asc");}
  };

  const SortHeader = ({col, children, flex}) => (
    <div onClick={()=>handleSort(col)} style={{flex:flex||1,cursor:"pointer",userSelect:"none",display:"flex",alignItems:"center",gap:4}}>
      <span>{children}</span>
      {sortCol===col && <span style={{fontSize:10}}>{sortDir==="asc"?"▲":"▼"}</span>}
    </div>
  );

  return (
    <div>
      <Legend />
      <div style={{fontSize:13,color:"#888",marginBottom:12}}>{sorted.length} kayıt</div>

      {/* Header */}
      <div style={{display:"flex",gap:8,padding:"10px 16px",background:"#1a3a0a",color:"#fff",borderRadius:"8px 8px 0 0",fontSize:11,fontWeight:700,letterSpacing:0.3}}>
        <SortHeader col="bitki" flex="1.2">Bitki</SortHeader>
        <SortHeader col="zararli" flex="2">Zararlı / Hastalık</SortHeader>
        <SortHeader col="urun" flex="1.2">Ürün</SortHeader>
        <div style={{flex:"0.7"}}>Grup</div>
        <SortHeader col="phi" flex="0.9">PHI</SortHeader>
        <SortHeader col="doz" flex="1.1">Doz</SortHeader>
        <SortHeader col="mrl" flex="0.7">MRL</SortHeader>
        <SortHeader col="gecerlilik" flex="0.8">Geçerlilik</SortHeader>
      </div>

      {/* Rows */}
      {sorted.map((d,i)=>(
        <div key={i} style={{
          display:"flex",gap:8,padding:"11px 16px",fontSize:13,alignItems:"center",
          background:i%2===0?"#fff":"#f9faf7",borderLeft:"1px solid #e8e8e8",borderRight:"1px solid #e8e8e8",
          borderBottom:"1px solid #eee",transition:"background 0.1s"
        }}
          onMouseEnter={e=>e.currentTarget.style.background="#EDF7ED"}
          onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"#fff":"#f9faf7"}>
          <div style={{flex:"1.2",fontWeight:600,color:"#1a1a1a"}}>{d.bitki}</div>
          <div style={{flex:"2",color:"#444",lineHeight:1.4}}>
            <div><ZararliName d={d}/></div>
            <div style={{fontSize:11,color:"#999",marginTop:2}}>{d.aktif}</div>
          </div>
          <div style={{flex:"1.2"}}><UrunBadge urun={d.urun} grup={d.grup}/></div>
          <div style={{flex:"0.7"}}><GrupBadge urun={d.urun} grup={d.grup}/></div>
          <div style={{flex:"0.9",fontWeight:700,color:(d.phi||"").includes("Tohum")?"#E65100":d.phi==="-"?"#bbb":"#010066"}}>{d.phi||"-"}</div>
          <div style={{flex:"1.1",color:"#2E7D32",fontWeight:500,fontSize:12}}>{d.doz||"-"}</div>
          <div style={{flex:"0.7",fontSize:12,color:"#666"}}>{d.mrl||"-"}</div>
          <div style={{flex:"0.8",fontSize:12,color:"#666"}}>{d.gecerlilik||"-"}</div>
        </div>
      ))}
      {sorted.length>0 && <div style={{height:4,background:"#1a3a0a",borderRadius:"0 0 8px 8px"}}/>}
      {sorted.length===0 && <div style={{textAlign:"center",padding:40,color:"#999"}}>Sonuç bulunamadı.</div>}
    </div>
  );
}

function CropView({ search }) {
  const [selectedCrop, setSelectedCrop] = useState(null);
  const crops = useMemo(()=>{
    const m={};
    data.forEach(d=>{const b=d.bitki||"DİĞER";if(!m[b])m[b]=[];m[b].push(d);});
    return m;
  },[]);
  const all = Object.keys(crops).sort((a,b)=>a.localeCompare(b,'tr'));
  const filtered = all.filter(c=>{
    if(!search) return true;
    const s=search.toLowerCase();
    return c.toLowerCase().includes(s)||crops[c].some(d=>(d.zararli||"").toLowerCase().includes(s)||(d.urun||"").toLowerCase().includes(s));
  });
  const active = selectedCrop && crops[selectedCrop] ? selectedCrop : null;

  return (
    <div>
      <Legend />
      <div style={{fontSize:13,color:"#888",marginBottom:14}}>{filtered.length} kültür bitkisi</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>
        {filtered.map(c=>{
          const sel=active===c;
          return (
            <button key={c} onClick={()=>setSelectedCrop(sel?null:c)}
              style={{padding:"8px 16px",borderRadius:24,fontSize:13,fontWeight:600,
                border:sel?"2px solid #019934":"1.5px solid #d0d0d0",
                background:sel?"#019934":"#fff",color:sel?"#fff":"#444",
                cursor:"pointer",transition:"all 0.15s",display:"flex",alignItems:"center",gap:6,
                boxShadow:sel?"0 2px 8px rgba(1,153,52,0.2)":"0 1px 3px rgba(0,0,0,0.05)"
              }}>
              🌱 {c}
              <span style={{fontSize:10,padding:"1px 7px",borderRadius:10,
                background:sel?"rgba(255,255,255,0.3)":"#E8F5E9",color:sel?"#fff":"#2E7D32"
              }}>{crops[c].length}</span>
            </button>
          );
        })}
      </div>

      {!active && filtered.length>0 && (
        <div style={{textAlign:"center",padding:32,color:"#aaa",fontSize:14,background:"#fff",borderRadius:12,border:"1.5px dashed #ddd"}}>
          Yukarıdan bir kültür bitkisi seçin
        </div>

      {active && (
        <div style={{borderRadius:12,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}}>
          <div style={{background:"#019934",color:"#fff",padding:"14px 20px",fontSize:17,fontWeight:700,display:"flex",alignItems:"center",gap:8}}>
            🌱 {active}
            <span style={{fontSize:12,fontWeight:400,opacity:0.85,marginLeft:4}}>— {crops[active].length} geçici tavsiye</span>
          </div>

            <div key={i} style={{padding:"16px 20px",background:i%2===0?"#fff":"#f9faf7",borderBottom:i<crops[active].length-1?"1px solid #eee":"none"}}>

                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:600,color:"#222",marginBottom:4}}><ZararliName d={d}/></div>

                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <GrupBadge urun={d.urun} grup={d.grup}/>

                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(140px, 1fr))",gap:8}}>
                {[
                  {l:"Son İlaçlama ile Hasat Arası Süre",v:d.phi,c:(d.phi||"").includes("Tohum")?"#E65100":d.phi==="-"?"#aaa":"#010066",b:true},
                  {l:"Doz",v:d.doz,c:"#2E7D32"},
                  {l:"MRL",v:d.mrl},
                  {l:"Geçerlilik",v:d.gecerlilik},
                ].map((f,fi)=>(
                  <div key={fi} style={{background:"#f4f6f1",padding:"8px 12px",borderRadius:6}}>
                    <div style={{fontSize:10,color:"#999",textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>{f.l}</div>
                    <div style={{fontSize:13,fontWeight:f.b?700:500,color:f.c||"#333"}}>{f.v||"-"}</div>
                  </div>
                ))}
              </div>
              {d.aciklama && d.aciklama!=="-" && (
                <div style={{marginTop:8,fontSize:12,color:"#666",background:"#FFF8E1",padding:"6px 12px",borderRadius:6,borderLeft:"3px solid #F9A825"}}>
                  {d.aciklama}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
