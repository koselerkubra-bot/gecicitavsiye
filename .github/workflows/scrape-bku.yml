name: BKU Geçici Tavsiye Güncelle

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Bağımlılıkları yükle
        run: pip install requests beautifulsoup4 pandas openpyxl
      - name: BKU verisi çek
        run: python bku_live_scraper.py
      - name: Dosyaları kontrol et
        run: |
          echo "=== Olusan dosyalar ==="
          ls -la data.js recurring.js syngenta_bku_live.xlsx 2>/dev/null || echo "Bazi dosyalar eksik"
      - name: Değişiklikleri commit et
        run: |
          git config user.name "BKU Bot"
          git config user.email "bot@syngenta.com"
          git add data.js recurring.js syngenta_bku_live.xlsx || true
          git status
          git diff --cached --quiet || git commit -m "BKU update $(date +%Y-%m-%d)"
          git push || true
